<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      font-weight: 300;
      color: #666;
      letter-spacing: 0.05em;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .video-card {
      background: #161616;
      border: 1px solid #222;
    }

    .video-card__embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
    }

    .video-card__embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-card__title {
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: #aaa;
      border-top: 1px solid #222;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<header>
  <h1>MY VIDEOS</h1>
  <p>A collection of videos</p>
</header>

<main>

  <!-- ── Add your videos below ── -->
  <!-- Copy a .video-card block for each video -->
  <!-- Replace VIDEO_ID with the ID from your YouTube URL (the part after ?v=) -->

  <div class="video-card">
    <div class="video-card__embed">
      <iframe
        src="https://www.youtube-nocookie.com/embed/VIDEO_ID"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy"
      ></iframe>
    </div>
    <div class="video-card__title">Video Title Here</div>
  </div>

  <div class="video-card">
    <div class="video-card__embed">
      <iframe
        src="https://www.youtube-nocookie.com/embed/VIDEO_ID"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy"
      ></iframe>
    </div>
    <div class="video-card__title">Video Title Here</div>
  </div>

  <div class="video-card">
    <div class="video-card__embed">
      <iframe
        src="https://www.youtube-nocookie.com/embed/VIDEO_ID"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy"
      ></iframe>
    </div>
    <div class="video-card__title">Video Title Here</div>
  </div>

</main>

</body>
</html>
